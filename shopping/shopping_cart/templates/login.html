{% extends 'base.html' %}
{% load socialaccount %}

{% block title %}Login | MyShop{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <h3 class="text-center fw-bold mb-4">Welcome Back</h3>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_email" class="form-label text-muted fw-semibold small">Email Address</label>
                    <input type="email" name="email" class="form-control form-control-lg rounded-3" id="id_email" placeholder="name@example.com" required>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label text-muted fw-semibold small">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg rounded-3" id="id_password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-semibold shadow-sm mb-3">Sign In</button>
            </form>
            
            <div class="text-center position-relative my-4">
                <hr>
                <span class="position-absolute top-50 start-50 translate-middle px-3 text-muted small bg-white rounded-pill">OR</span>
            </div>
            
            <a href="{% provider_login_url 'google' %}" class="btn btn-outline-dark btn-lg w-100 rounded-pill fw-semibold mb-3">
                <i class="fa-brands fa-google text-danger me-2"></i> Sign in with Google
            </a>

            <p class="text-center text-muted small mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary text-decoration-none fw-semibold">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
